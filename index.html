<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🗿 TDW Editor</title>
  <style>
    /* -- Variables & Reset -- */
    :root {
      --bg:        #0f1117;
      --bg2:       #181c27;
      --bg3:       #1f2435;
      --border:    #2e3450;
      --text:      #d4d8f0;
      --muted:     #6070a0;
      --accent:    #5b8fff;
      --accent2:   #ffcc44;
      --danger:    #ff5555;
      --success:   #44dd88;
      --chord:     #ffaa33;
      --control:   #ff7070;
      --rest:      #505878;
      --radius:    5px;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --font-ui:   'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* -- Toolbar -- */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--accent2);
      margin-right: 6px;
      white-space: nowrap;
    }

    .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    .toolbar-group { display: flex; align-items: center; gap: 4px; }
    .toolbar-label { color: var(--muted); font-size: 11px; }

    input[type=number], input[type=text], select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 6px;
      border-radius: var(--radius);
      font: inherit;
    }
    input[type=number] { width: 60px; }
    #timeSigNum, #timeSigDen { width: 36px; }

    button {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font: inherit;
      white-space: nowrap;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { filter: brightness(1.15); }

    /* Play button states */
    #btnPlay {
      min-width: 90px;
      font-weight: 600;
      transition: background .15s, border-color .15s;
    }
    #btnPlay.playing {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }
    #btnPlay.loading {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #000;
      cursor: wait;
    }
    #btnPlay.playing:hover { filter: brightness(1.15); }

    /* Duration picker buttons */
    #durPicker { display: flex; gap: 3px; }
    .dur-btn {
      padding: 3px 7px;
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .dur-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* -- Main layout -- */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* -- Sidebar tabs -- */
    #sidebar {
      width: 210px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 7px 4px;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); background: transparent; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: transparent; }

    .tab-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* -- Sound picker -- */
    #picker {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }

    .picker-search-wrap { padding: 8px; flex-shrink: 0; }
    .picker-search { width: 100%; }

    .picker-list {
      overflow-y: auto;
      flex: 1;
      padding-bottom: 8px;
    }
    .picker-list::-webkit-scrollbar { width: 6px; }
    .picker-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .picker-group-header {
      padding: 6px 10px 3px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      position: sticky;
      top: 0;
      background: var(--bg2);
    }

    .picker-sound {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      padding: 4px 10px;
      text-align: left;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--text);
    }
    .picker-sound:hover { background: var(--bg3); }

    .picker-icon { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
    .picker-label { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .picker-loading { padding: 16px; color: var(--muted); text-align: center; }
    .picker-search-hint { font-size: 10px; color: var(--muted); padding: 2px 0 0; }
    .picker-info { display: flex; flex-direction: column; overflow: hidden; }
    .picker-meta { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* -- Actions panel -- */
    #actions-panel { overflow-y: auto; padding: 8px; }
    #actions-panel::-webkit-scrollbar { width: 6px; }
    #actions-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
    .actions-divider { grid-column: 1 / -1; height: 1px; background: var(--border); margin: 3px 0; }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px;
      border-radius: var(--radius);
      position: relative;
      min-height: 52px;
      justify-content: center;
    }
    .action-btn.active { background: var(--accent); border-color: var(--accent); }
    .action-btn.active .action-shortcut { color: rgba(255,255,255,.7); }

    .action-icon { width: 28px; height: 28px; object-fit: contain; }
    .action-label-fallback { font-size: 9px; text-align: center; line-height: 1.2; }
    .action-shortcut {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--muted);
      position: absolute;
      top: 2px;
      right: 4px;
    }

    /* Config panel (value input area under the grid) */
    .action-config {
      margin-top: 8px;
      padding: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .config-title { font-weight: 700; font-size: 12px; margin-bottom: 8px; color: var(--accent2); }
    .config-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .config-value { width: 80px; }
    .config-unit { font-size: 11px; color: var(--muted); }
    .config-color { width: 32px; height: 28px; padding: 1px; border-radius: var(--radius); cursor: pointer; }
    .config-insert { margin-top: 4px; width: 100%; }

    .mod-btn { font-size: 11px; padding: 3px 7px; }
    .mod-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* -- Editor area -- */
    #editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #ruler {
      height: 20px;
      flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      display: flex;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      gap: 4px;
      overflow: hidden;
    }

    #seq-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 16px 12px;
    }
    #seq-wrap::-webkit-scrollbar { height: 6px; width: 6px; }
    #seq-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #seq {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 2px;
      min-height: 80px;
      outline: none;
      cursor: text;
    }

    /* -- Slot tokens -- */
    .seq-slot {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 6px;
      cursor: pointer;
      user-select: none;
      position: relative;
      background: var(--bg3);
      transition: filter .08s;
    }
    .seq-slot:hover { filter: brightness(1.2); }
    .seq-slot.selected { outline: 2px solid var(--accent); outline-offset: 1px; }

    .seq-sound  { border-color: #3a4a7a; }
    .seq-sound-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }
    .seq-chord  { border-color: var(--chord); }
    .seq-rest   { border-color: var(--rest); color: var(--rest); font-family: var(--font-mono); font-size: 18px; padding: 2px 8px; }
    .seq-control{ border-color: var(--control); color: var(--control); font-family: var(--font-mono); font-size: 11px; }

    .seq-divider {
      width: 100%;
      border-color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
    }

    .seq-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .seq-icon   { width: 28px; height: 28px; object-fit: contain; display: block; }
    .seq-pitch  {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--accent2);
      position: absolute;
      top: 1px;
      right: 3px;
      z-index: 1;
    }
    .seq-dur    { font-family: var(--font-mono); font-size: 8px; color: var(--muted); position: absolute; bottom: 1px; right: 3px; }

    .seq-cursor {
      display: inline-block;
      width: 2px;
      height: 36px;
      background: var(--accent);
      border-radius: 1px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      flex-shrink: 0;
    }
    @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }

    .seq-hint {
      color: var(--muted);
      font-size: 12px;
      align-self: center;
      padding-left: 12px;
      pointer-events: none;
    }

    /* -- Status bar -- */
    #statusbar {
      padding: 3px 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
    #statusbar span b { color: var(--text); }

    /* Playing indicator in status bar */
    #sbPlaying {
      color: var(--success);
      display: none;
    }
    #sbPlaying.active { display: inline; }
    #sbPlaying::before { content: '● '; }
  </style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span class="toolbar-title">🗿 TDW Editor</span>
  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span class="toolbar-label">BPM</span>
    <input type="number" id="bpmInput" min="1" max="10000" value="120">
  </div>

  <div class="toolbar-group">
    <span class="toolbar-label">Time</span>
    <input type="number" id="timeSigNum" min="1" max="32" value="4" title="Beats per measure">
    <span class="toolbar-label">/</span>
    <input type="number" id="timeSigDen" min="1" max="32" value="4" title="Beat unit">
  </div>

  <div class="toolbar-sep"></div>

  <!-- Duration picker -->
  <div class="toolbar-group">
    <span class="toolbar-label">Duration</span>
    <div id="durPicker">
      <button class="dur-btn" data-n="4" data-d="1" title="Whole note">𝅝</button>
      <button class="dur-btn" data-n="2" data-d="1" title="Half note">𝅗𝅥</button>
      <button class="dur-btn active" data-n="1" data-d="1" title="Quarter note">♩</button>
      <button class="dur-btn" data-n="1" data-d="2" title="Eighth note">♪</button>
      <button class="dur-btn" data-n="1" data-d="4" title="Sixteenth note">𝅘𝅥𝅯</button>
      <button class="dur-btn" data-n="1" data-d="3" title="Triplet eighth">3</button>
      <button class="dur-btn" data-n="2" data-d="3" title="Triplet quarter">3q</button>
      <button class="dur-btn" data-n="1" data-d="5" title="Quintuplet">5</button>
    </div>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <button id="btnNew">New</button>
    <button id="btnLoad">Open</button>
    <button id="btnImportTDW">Import .🗿</button>
    <button id="btnSave">Save .tde</button>
    <button id="btnExport">Export .🗿</button>
    <button id="btnOpenTDW">Open in TDW</button>
    <button class="primary" id="btnPlay">▶ Play</button>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="fileLoad"      accept=".tde,.json" style="display:none">
  <input type="file" id="fileImportTDW" accept=".🗿,.txt"   style="display:none">
</div>

<!-- Main layout -->
<div id="main">

  <!-- Left sidebar: tabbed sounds + actions -->
  <div id="sidebar">
    <div id="sidebar-tabs">
      <button class="tab-btn active" data-tab="picker">Sounds</button>
      <button class="tab-btn"        data-tab="actions-panel">Actions</button>
    </div>
    <div id="picker"        class="tab-panel"></div>
    <div id="actions-panel" class="tab-panel" style="display:none"></div>
  </div>

  <!-- Editor area -->
  <div id="editor-area">
    <div id="ruler">Click a sound to insert · Space = rest · Backspace = delete · Shift+arrows = select · Ctrl+C/V = copy/paste · Scroll = pitch · ↑↓ = pitch · Right-click = preview</div>
    <div id="seq-wrap">
      <div id="seq"></div>
    </div>
  </div>

</div>

<!-- Status bar -->
<div id="statusbar">
  <span>Slots: <b id="sbSlots">0</b></span>
  <span>Cursor: <b id="sbCursor">0</b></span>
  <span>BPM: <b id="sbBPM">120</b></span>
  <span id="sbSelection" style="display:none">Selection: <b id="sbSelRange"></b></span>
  <span id="sbUndo"    style="display:none; color: var(--accent)">Unsaved changes</span>
  <span id="sbPlaying">Playing</span>
</div>

<script type="module">
  import * as App      from './app.js'
  import * as Editor   from './ui/editor.js'
  import * as Picker   from './ui/soundpicker.js'
  import * as Actions  from './ui/actions.js'
  import * as Seq      from './audio/sequencer.js'
  import { Fraction }  from './model/fraction.js'

  // Boot
  App.loadSounds()
  Editor.init(document.getElementById('seq'))
  Picker.init(document.getElementById('picker'))
  Actions.init(document.getElementById('actions-panel'))

  // -- Tab switching --
  document.getElementById('sidebar-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn')
    if (!btn) return
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none')
    btn.classList.add('active')
    document.getElementById(btn.dataset.tab).style.display = 'flex'
  })

  // -- Toolbar wiring --

  const bpmInput = document.getElementById('bpmInput')
  bpmInput.addEventListener('change', () => App.setBPM(+bpmInput.value))
  bpmInput.addEventListener('input',  () => App.setBPM(+bpmInput.value))

  document.getElementById('timeSigNum').addEventListener('change', updateTimeSig)
  document.getElementById('timeSigDen').addEventListener('change', updateTimeSig)
  function updateTimeSig() {
    App.setTimeSignature(
      +document.getElementById('timeSigNum').value,
      +document.getElementById('timeSigDen').value
    )
  }

  document.getElementById('durPicker').addEventListener('click', e => {
    const btn = e.target.closest('.dur-btn')
    if (!btn) return
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    App.setActiveDuration(new Fraction(+btn.dataset.n, +btn.dataset.d))
  })

  document.getElementById('btnNew').addEventListener('click', () => {
    if (App.state.project.slots.length && !confirm('Start a new project? Unsaved changes will be lost.')) return
    App.newProject()
  })

  document.getElementById('btnSave').addEventListener('click', App.saveProject)
  document.getElementById('btnExport').addEventListener('click', App.exportTDWFile)
  document.getElementById('btnOpenTDW').addEventListener('click', App.openInTDW)

  document.getElementById('btnLoad').addEventListener('click', () => document.getElementById('fileLoad').click())
  document.getElementById('fileLoad').addEventListener('change', e => {
    if (e.target.files[0]) App.loadProjectFile(e.target.files[0])
    e.target.value = ''
  })

  document.getElementById('btnImportTDW').addEventListener('click', () => document.getElementById('fileImportTDW').click())
  document.getElementById('fileImportTDW').addEventListener('change', e => {
    if (e.target.files[0]) App.importTDWFile(e.target.files[0])
    e.target.value = ''
  })

  // -- Play / Stop --

  const btnPlay = document.getElementById('btnPlay')

  btnPlay.addEventListener('click', async () => {
    if (Seq.isActive()) {
      Seq.stop()
      setPlayUI(false)
      return
    }

    if (!App.state.project.slots.length) return

    setPlayUI('loading')
    try {
      await Seq.play(App.state.project, {
        onStop: () => setPlayUI(false),
      })
      setPlayUI('playing')
    } catch (e) {
      console.error('[play] Failed:', e)
      setPlayUI(false)
    }
  })

  function setPlayUI(state) {
    const playing = document.getElementById('sbPlaying')
    if (state === 'loading') {
      btnPlay.textContent = '… Loading'
      btnPlay.className = 'loading'
      btnPlay.disabled = true
      playing.classList.remove('active')
    } else if (state === 'playing') {
      btnPlay.textContent = '⏹ Stop'
      btnPlay.className = 'playing'
      btnPlay.disabled = false
      playing.classList.add('active')
    } else {
      btnPlay.textContent = '▶ Play'
      btnPlay.className = 'primary'
      btnPlay.disabled = false
      playing.classList.remove('active')
    }
  }

  // Stop playback if the project changes while playing
  document.addEventListener('statechange', () => {
    if (Seq.isActive()) {
      Seq.stop()
      setPlayUI(false)
    }
  })

  // -- Status bar updates --
  document.addEventListener('statechange', () => {
    const { project, cursorPos, selection, undoStack } = App.state
    document.getElementById('sbSlots').textContent  = project.slots.length
    document.getElementById('sbCursor').textContent = cursorPos
    document.getElementById('sbBPM').textContent    = project.bpm

    bpmInput.value = project.bpm
    document.getElementById('timeSigNum').value = project.timeSignature.numerator
    document.getElementById('timeSigDen').value = project.timeSignature.denominator

    const selEl = document.getElementById('sbSelection')
    if (selection) {
      selEl.style.display = ''
      document.getElementById('sbSelRange').textContent =
        `${selection.start}–${selection.end} (${selection.end - selection.start + 1} slots)`
    } else {
      selEl.style.display = 'none'
    }

    document.getElementById('sbUndo').style.display = undoStack.length ? '' : 'none'
  })
</script>
</body>
</html>
