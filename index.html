<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🗿 TDW Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
  <span class="toolbar-title">🗿 TDW Editor</span>
  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span class="toolbar-label">BPM</span>
    <input type="number" id="bpmInput" min="1" max="10000" value="120">
  </div>

  <div class="toolbar-group">
    <span class="toolbar-label">Time</span>
    <input type="number" id="timeSigNum" min="1" max="32" value="4" title="Beats per measure">
    <span class="toolbar-label">/</span>
    <input type="number" id="timeSigDen" min="1" max="32" value="4" title="Beat unit">
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span class="toolbar-label">Duration</span>
    <div id="durPicker">
      <button class="dur-btn" data-n="4" data-d="1" title="Whole note">𝅝</button>
      <button class="dur-btn" data-n="2" data-d="1" title="Half note">𝅗𝅥</button>
      <button class="dur-btn active" data-n="1" data-d="1" title="Quarter note">♩</button>
      <button class="dur-btn" data-n="1" data-d="2" title="Eighth note">♪</button>
      <button class="dur-btn" data-n="1" data-d="4" title="Sixteenth note">𝅘𝅥𝅯</button>
      <button class="dur-btn" data-n="1" data-d="3" title="Triplet eighth">3</button>
      <button class="dur-btn" data-n="2" data-d="3" title="Triplet quarter">3q</button>
      <button class="dur-btn" data-n="1" data-d="5" title="Quintuplet">5</button>
    </div>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <button id="btnNew">New</button>
    <button id="btnLoad">Open</button>
    <button id="btnImportTDW">Import .🗿</button>
    <button id="btnSave">Save .tde</button>
    <button id="btnExport">Export .🗿</button>
    <button class="primary" id="btnPlay">▶ Play</button>
  </div>

  <input type="file" id="fileLoad"      accept=".tde,.json" style="display:none">
  <input type="file" id="fileImportTDW" accept=".🗿,.txt"   style="display:none">
</div>

<div id="main">

  <div id="sidebar">
    <div id="sidebar-tabs">
      <button class="tab-btn active" data-tab="picker">Sounds</button>
      <button class="tab-btn"        data-tab="actions-panel">Actions</button>
    </div>
    <div id="picker"        class="tab-panel"></div>
    <div id="actions-panel" class="tab-panel" style="display:none"></div>
  </div>

  <div id="editor-area">
    <div id="ruler">Click a sound to insert · Space = rest · Backspace = delete · Shift+arrows = select · Ctrl+C/V = copy/paste · Scroll = pitch · ↑↓ = pitch · Right-click = preview</div>

    <div id="seq-wrap" tabindex="0"></div>
  </div>

</div>

<div id="statusbar">
  <span>Track: <b id="sbTrack">1</b></span>
  <span>Slots: <b id="sbSlots">0</b></span>
  <span>Cursor: <b id="sbCursor">0</b></span>
  <span>BPM: <b id="sbBPM">120</b></span>
  <span id="sbSelection" style="display:none">Selection: <b id="sbSelRange"></b></span>
  <span id="sbUndo"    style="display:none; color: var(--accent)">Unsaved changes</span>
  <span id="sbPlaying">Playing</span>
</div>

<script type="module">
  import * as App     from './app.js'
  import * as Editor  from './ui/editor.js'
  import * as Picker  from './ui/soundpicker.js'
  import * as Actions from './ui/actions.js'
  import * as Seq     from './audio/sequencer.js'
  import { Fraction } from './model/fraction.js'

  const domCache = {
    bpmInput:        document.getElementById('bpmInput'),
    timeSigNum:      document.getElementById('timeSigNum'),
    timeSigDen:      document.getElementById('timeSigDen'),
    sbTrack:         document.getElementById('sbTrack'),
    sbSlots:         document.getElementById('sbSlots'),
    sbCursor:        document.getElementById('sbCursor'),
    sbBPM:           document.getElementById('sbBPM'),
    sbSelection:     document.getElementById('sbSelection'),
    sbSelRange:      document.getElementById('sbSelRange'),
    sbUndo:          document.getElementById('sbUndo'),
    sbPlaying:       document.getElementById('sbPlaying'),
    seqWrap:         document.getElementById('seq-wrap'),
    btnPlay:         document.getElementById('btnPlay'),
    durPicker:       document.getElementById('durPicker'),
  }

  App.loadSounds()
  Editor.init(domCache.seqWrap)
  Picker.init(document.getElementById('picker'))
  Actions.init(document.getElementById('actions-panel'))

  document.getElementById('sidebar-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn')
    if (!btn) return
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none')
    btn.classList.add('active')
    document.getElementById(btn.dataset.tab).style.display = 'flex'
  })

  domCache.bpmInput.addEventListener('change', () => App.setBPM(+domCache.bpmInput.value))
  domCache.bpmInput.addEventListener('input',  () => App.setBPM(+domCache.bpmInput.value))

  domCache.timeSigNum.addEventListener('change', updateTimeSig)
  domCache.timeSigDen.addEventListener('change', updateTimeSig)
  function updateTimeSig() {
    App.setTimeSignature(
      +domCache.timeSigNum.value,
      +domCache.timeSigDen.value
    )
  }

  domCache.durPicker.addEventListener('click', e => {
    const btn = e.target.closest('.dur-btn')
    if (!btn) return
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    App.setActiveDuration(new Fraction(+btn.dataset.n, +btn.dataset.d))
  })

  document.getElementById('btnNew').addEventListener('click', () => {
    const hasContent = App.state.project.tracks.some(t => t.slots.length > 0)
    if (hasContent && !confirm('Start a new project? Unsaved changes will be lost.')) return
    App.newProject()
  })

  document.getElementById('btnSave').addEventListener('click', App.saveProject)
  document.getElementById('btnExport').addEventListener('click', App.exportTDWFile)

  document.getElementById('btnLoad').addEventListener('click', () => document.getElementById('fileLoad').click())
  document.getElementById('fileLoad').addEventListener('change', e => {
    if (e.target.files[0]) App.loadProjectFile(e.target.files[0])
    e.target.value = ''
  })

  document.getElementById('btnImportTDW').addEventListener('click', () => document.getElementById('fileImportTDW').click())
  document.getElementById('fileImportTDW').addEventListener('change', e => {
    if (e.target.files[0]) App.importTDWFile(e.target.files[0])
    e.target.value = ''
  })

  domCache.btnPlay.addEventListener('click', async () => {
    if (Seq.isActive()) {
      Seq.stop()
      setPlayUI(false)
      return
    }

    const hasContent = App.state.project.tracks.some(t => t.slots.length > 0)
    if (!hasContent) return

    setPlayUI('loading')
    try {
      await Seq.play(App.state.project, {
        onStop: () => setPlayUI(false),
      })
      setPlayUI('playing')
    } catch (e) {
      console.error('[play] Failed:', e)
      setPlayUI(false)
    }
  })

  function setPlayUI(state) {
    if (state === 'loading') {
      domCache.btnPlay.textContent = '… Loading'
      domCache.btnPlay.className   = 'loading'
      domCache.btnPlay.disabled    = true
      domCache.sbPlaying.classList.remove('active')
    } else if (state === 'playing') {
      domCache.btnPlay.textContent = '⏹ Stop'
      domCache.btnPlay.className   = 'playing'
      domCache.btnPlay.disabled    = false
      domCache.sbPlaying.classList.add('active')
    } else {
      domCache.btnPlay.textContent = '▶ Play'
      domCache.btnPlay.className   = 'primary'
      domCache.btnPlay.disabled    = false
      domCache.sbPlaying.classList.remove('active')
    }
  }

  document.addEventListener('statechange', () => {
    if (Seq.isActive()) {
      Seq.stop()
      setPlayUI(false)
    }
  })

  document.addEventListener('statechange', () => {
    const { project, activeTrackIndex, cursorPos, selection, undoStack } = App.state
    const track = App.activeTrack()

    domCache.sbTrack.textContent  = `${activeTrackIndex + 1} / ${project.tracks.length}`
    domCache.sbSlots.textContent  = track.slots.length
    domCache.sbCursor.textContent = cursorPos
    domCache.sbBPM.textContent    = project.bpm

    domCache.bpmInput.value = project.bpm
    domCache.timeSigNum.value = project.timeSignature.numerator
    domCache.timeSigDen.value = project.timeSignature.denominator

    if (selection) {
      domCache.sbSelection.style.display = ''
      domCache.sbSelRange.textContent =
        `${selection.start}–${selection.end} (${selection.end - selection.start + 1} slots)`
    } else {
      domCache.sbSelection.style.display = 'none'
    }

    domCache.sbUndo.style.display = undoStack.length ? '' : 'none'
  })
</script>
</body>
</html>
