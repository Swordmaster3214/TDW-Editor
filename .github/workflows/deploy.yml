name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync sounds from upstream
        id: sync
        env:
          SOUNDS_BASE_URL: https://thirtydollar.website
          CONCURRENCY: "24"
        run: node ./sync_sounds.mjs

      - name: Stage Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site

          cp index.html _site/
          cp style.css _site/
          cp app.js _site/
          cp -r audio _site/
          cp -r io _site/
          cp -r model _site/
          cp -r ui _site/

          cp sounds.json _site/
          cp -r sounds _site/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-site
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-site
